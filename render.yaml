services:
  - type: web
    name: internship-readiness-ml
    runtime: python
    plan: free
    rootDir: ml-service
    buildCommand: pip install -r requirements.txt
    startCommand: cd src && uvicorn api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health

  - type: web
    name: internship-readiness-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ML_SERVICE_URL
        value: https://replace-with-your-ml-service.onrender.com
      - key: CORS_ORIGINS
        sync: false
